services:
  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    volumes:
      - ./infra/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 45s

  zipkin:
    image: openzipkin/zipkin:2.24.3
    restart: unless-stopped
    ports:
      - "9411:9411"

  keycloak-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  keycloak:
    image: quay.io/keycloak/keycloak:25.0.6
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HTTP_PORT: 8080
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./infra/keycloak/event-hub-realm.json:/opt/keycloak/data/import/event-hub-realm.json:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    ports:
      - "8088:8080"

  event-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: eventdb
      POSTGRES_USER: event
      POSTGRES_PASSWORD: event
    ports:
      - "5431:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U event -d eventdb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  inventory-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: inventorydb
      POSTGRES_USER: inventory
      POSTGRES_PASSWORD: inventory
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory -d inventorydb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  order-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: order
      POSTGRES_PASSWORD: order
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order -d orderdb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  payment-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: paymentdb
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: payment
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment -d paymentdb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  ticket-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ticketdb
      POSTGRES_USER: ticket
      POSTGRES_PASSWORD: ticket
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticket -d ticketdb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  user-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
    ports:
      - "5438:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d userdb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  event-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: event-service
    environment:
      SERVER_PORT: 8081
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://event-db:5432/eventdb
      SPRING_DATASOURCE_USERNAME: event
      SPRING_DATASOURCE_PASSWORD: event
      SPRING_RABBITMQ_HOST: rabbitmq
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      APP_INVENTORY_BASE_URL: http://inventory-service:8082
      APP_PAYMENT_BASE_URL: http://payment-service:8084
      APP_ORDER_BASE_URL: http://order-service:8083
    depends_on:
      event-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8081:8081"

  inventory-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: inventory-service
    environment:
      SERVER_PORT: 8082
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://inventory-db:5432/inventorydb
      SPRING_DATASOURCE_USERNAME: inventory
      SPRING_DATASOURCE_PASSWORD: inventory
      SPRING_RABBITMQ_HOST: rabbitmq
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      APP_EVENT_BASE_URL: http://event-service:8081
    depends_on:
      inventory-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      event-service:
        condition: service_started
    ports:
      - "8082:8082"

  order-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: order-service
    environment:
      SERVER_PORT: 8083
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://order-db:5432/orderdb
      SPRING_DATASOURCE_USERNAME: order
      SPRING_DATASOURCE_PASSWORD: order
      SPRING_RABBITMQ_HOST: rabbitmq
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      APP_EVENT_BASE_URL: http://event-service:8081
      APP_INVENTORY_BASE_URL: http://inventory-service:8082
      APP_PAYMENT_BASE_URL: http://payment-service:8084
    depends_on:
      order-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      event-service:
        condition: service_started
      inventory-service:
        condition: service_started
      payment-service:
        condition: service_started
    ports:
      - "8083:8083"

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: payment-service
    environment:
      SERVER_PORT: 8084
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://payment-db:5432/paymentdb
      SPRING_DATASOURCE_USERNAME: payment
      SPRING_DATASOURCE_PASSWORD: payment
      SPRING_RABBITMQ_HOST: rabbitmq
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      payment-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8084:8084"

  ticket-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: ticket-service
    environment:
      SERVER_PORT: 8085
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://ticket-db:5432/ticketdb
      SPRING_DATASOURCE_USERNAME: ticket
      SPRING_DATASOURCE_PASSWORD: ticket
      SPRING_RABBITMQ_HOST: rabbitmq
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      ticket-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      order-service:
        condition: service_started
    ports:
      - "8085:8085"

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: notification-service
    environment:
      SERVER_PORT: 8086
      SPRING_PROFILES_ACTIVE: docker
      SPRING_RABBITMQ_HOST: rabbitmq
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      rabbitmq:
        condition: service_healthy
      ticket-service:
        condition: service_started
    ports:
      - "8086:8086"

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: user-service
    environment:
      SERVER_PORT: 8087
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-db:5432/userdb
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: user
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: event-hub
      KEYCLOAK_ADMIN_CLIENT_ID: event-hub-user-service
      KEYCLOAK_ADMIN_CLIENT_SECRET: user-service-secret
    depends_on:
      user-db:
        condition: service_healthy
      keycloak:
        condition: service_started
    ports:
      - "8087:8087"

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: api-gateway
    environment:
      SERVER_PORT: 8080
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      APP_EVENT_BASE_URL: http://event-service:8081
      APP_ORDER_BASE_URL: http://order-service:8083
      APP_PAYMENT_BASE_URL: http://payment-service:8084
      APP_USER_BASE_URL: http://user-service:8087
      APP_TICKET_BASE_URL: http://ticket-service:8085
      APP_GATEWAY_RATE_LIMIT: 120
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/event-hub
    depends_on:
      keycloak:
        condition: service_started
      event-service:
        condition: service_started
      inventory-service:
        condition: service_started
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
      ticket-service:
        condition: service_started
      notification-service:
        condition: service_started
      user-service:
        condition: service_started
      zipkin:
        condition: service_started
    ports:
      - "8080:8080"

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      event-service:
        condition: service_started
      inventory-service:
        condition: service_started
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
      ticket-service:
        condition: service_started
      notification-service:
        condition: service_started
      user-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.3.1
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
