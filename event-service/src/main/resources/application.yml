spring:
  application:
    name: event-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/eventdb}
    username: ${SPRING_DATASOURCE_USERNAME:event}
    password: ${SPRING_DATASOURCE_PASSWORD:event}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  jackson:
    serialization:
      write-dates-as-timestamps: false
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
    web:
      server:
        request:
          autotime:
            percentiles-histogram: true
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
  tracing:
    sampling:
      probability: 1.0
resilience4j:
  retry:
    instances:
      inventoryService:
        max-attempts: 3
        wait-duration: 250ms
  circuitbreaker:
    instances:
      inventoryService:
        sliding-window-size: 5
        permitted-number-of-calls-in-half-open-state: 2
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

server:
  port: ${SERVER_PORT:8081}

app:
  demo:
    competition-id: 00000000-0000-0000-0000-000000000001
    stadium-id: 00000000-0000-0000-0000-000000000010
    event-id: 00000000-0000-0000-0000-000000000101
    category1-ticket-category-id: 11111111-1111-1111-1111-111111111111
    category2-ticket-category-id: 22222222-2222-2222-2222-222222222222
