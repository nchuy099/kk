spring:
  application:
    name: user-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/userdb}
    username: ${SPRING_DATASOURCE_USERNAME:user}
    password: ${SPRING_DATASOURCE_PASSWORD:user}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  jackson:
    serialization:
      write-dates-as-timestamps: false
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
    web:
      server:
        request:
          autotime:
            percentiles-histogram: true
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
  tracing:
    sampling:
      probability: 1.0

server:
  port: ${SERVER_PORT:8087}

app:
  keycloak:
    base-url: ${KEYCLOAK_BASE_URL:http://localhost:8088}
    realm: ${KEYCLOAK_REALM:event-hub}
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:event-hub-user-service}
    client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:user-service-secret}
