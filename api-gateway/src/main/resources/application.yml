spring:
  application:
    name: api-gateway
  jackson:
    serialization:
      write-dates-as-timestamps: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8088/realms/event-hub}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
    web:
      server:
        request:
          autotime:
            percentiles-histogram: true
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
  tracing:
    sampling:
      probability: 1.0

server:
  port: ${SERVER_PORT:8080}

app:
  gateway:
    routes:
      events-base-url: ${APP_EVENT_BASE_URL:http://localhost:8081}
      orders-base-url: ${APP_ORDER_BASE_URL:http://localhost:8083}
      payments-base-url: ${APP_PAYMENT_BASE_URL:http://localhost:8084}
      users-base-url: ${APP_USER_BASE_URL:http://localhost:8087}
      tickets-base-url: ${APP_TICKET_BASE_URL:http://localhost:8085}
    rateLimit:
      requestsPerMinute: ${APP_GATEWAY_RATE_LIMIT:120}
